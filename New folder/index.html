<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <!-- Notification Bar Container -->
<div id="notification-bar" class="notify-bar">
    <div class="notify-content">
        <!-- Notification Icon -->
        <i class="fa-solid fa-bell notify-icon"></i>
        <span class="notify-text">Welcome! Check out our latest updates and offers.</span>
    </div>
    <!-- Close Button -->
    <button class="close-btn" onclick="closeNotification()">×</button>
</div>

<!-- Trigger Button (To show it again if needed) -->
<button id="show-notify-btn" class="show-btn" onclick="showNotification()">Show Notification</button>

</body>
</html>
